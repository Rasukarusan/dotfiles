# 自動マージされる「実用モード」設定。
# `docker compose up` でホストから API/UI を使える状態にする。
#
# 【経緯】当初はここで default ネットワークを internal:true にして外部遮断していたが、
# Docker Desktop では internal ネットワークだとホストへのポート公開(127.0.0.1:11434 等)が
# 無効化され、ホスト・LAN問わず一切アクセスできなくなる(コンテナ間通信のみ可)。
# そのため internal による遮断は廃止し、隔離は「ポートを 127.0.0.1 のみに束縛」で担保する:
#   - LAN の他マシンからはアクセス不可(loopback 束縛)
#   - 推論(チャット)は完全ローカルで動作し、プロンプトは外部送信されない
#   - 外向き通信が起きるのは ollama の更新チェック等の軽微なものだけ(推論とは無関係)
# 完全な物理遮断が必要な場合は、内部ネット+リバースプロキシ構成を別途検討すること。
services:
  ollama:
    environment:
      # モデルをメモリに常駐させ、毎回のロード(数十秒)を避けてレスポンスを安定させる
      - OLLAMA_KEEP_ALIVE=24h
