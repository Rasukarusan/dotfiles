<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mdtree</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <span class="repo-name" id="repo-name">…</span>
        <button id="sidebar-collapse" class="icon-btn" title="サイドバーを閉じる">✕</button>
      </div>
      <div class="filter-box">
        <input type="text" id="filter" placeholder="ファイルを絞り込み…" autocomplete="off" spellcheck="false">
        <label class="show-all-toggle">
          <input type="checkbox" id="show-all-files">
          <span>すべてのファイルを表示</span>
        </label>
      </div>
      <nav id="tree" class="tree"></nav>
    </aside>
    <div id="resizer"></div>
    <main id="main">
      <header id="breadcrumb-bar" class="breadcrumb-bar">
        <button id="sidebar-expand" class="icon-btn" title="サイドバーを開く" hidden>☰</button>
        <div id="breadcrumb" class="breadcrumb"></div>
      </header>
      <article id="content" class="content markdown-body">
        <div class="empty-state">
          <p>左のツリーからファイルを選択してください</p>
        </div>
      </article>
    </main>
  </div>
  <!-- mermaid 本体(バイナリに同梱・オフライン動作)。app.js より前に読み込み window.mermaid を用意 -->
  <script src="/static/mermaid.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
